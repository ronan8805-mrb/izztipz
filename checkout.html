<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — DizTipz Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <header class="glass-header">
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="My-assets/Screenshot_2026-05-10_183738-removebg-preview.png" alt="DizTipz Logo" id="main-logo">
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html#features">Expertise</a>
                <a href="pricing.html">Pricing</a>
                <a href="vip.html" class="vip-highlight">VIP Access</a>
                <div class="auth-group">
                    <a href="login.html" class="btn-text">Sign In</a>
                    <a href="signup.html" class="btn-outline">Join Now</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-xl">
        <div class="checkout-grid">
            <div class="checkout-form glass">
                <h2>Secure Payment</h2>
                <div class="payment-methods">
                    <div class="method active">Credit Card</div>
                    <div class="method">Crypto</div>
                </div>
                <form id="payment-form">
                    <div class="form-group">
                        <label>Cardholder Name</label>
                        <input type="text" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" required placeholder="0000 0000 0000 0000">
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label>Expiry</label>
                            <input type="text" required placeholder="MM/YY">
                        </div>
                        <div class="form-group">
                            <label>CVC</label>
                            <input type="text" required placeholder="000">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary-gold w-full mt-l">COMPLETE PURCHASE</button>
                </form>
            </div>

            <div class="order-summary glass">
                <h2>Order Summary</h2>
                <div id="cart-items-list">
                    <!-- Items injected by JS -->
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="order-total">£0.00</span>
                </div>
            </div>
        </div>
    </main>

    <div id="payment-success" class="modal hidden">
        <div class="modal-content glass text-center">
            <div class="check-icon">✓</div>
            <h2>Payment Successful!</h2>
            <p>Welcome to the Elite. Your dashboard is now unlocked.</p>
            <button id="go-to-dash" class="btn-primary-gold mt-l">ENTER DASHBOARD</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Simple checkout logic
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const list = document.getElementById('cart-items-list');
        const totalEl = document.getElementById('order-total');
        let total = 0;

        cart.forEach(item => {
            const div = document.createElement('div');
            div.className = 'summary-row';
            div.innerHTML = `<span>${item.id.toUpperCase()} Membership</span> <span>£${item.price}</span>`;
            list.appendChild(div);
            total += parseFloat(item.price);
        });
        totalEl.textContent = `£${total.toFixed(2)}`;

        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const cart = JSON.parse(localStorage.getItem('diz_cart'));
            if(cart && cart.length > 0) {
                upgradeUser(cart[0].tier); // Upgrade to the first item in cart
            }
            alert('Payment Successful! Welcome to the Elite.');
            localStorage.removeItem('diz_cart');
            window.location.href = 'dashboard.html';
        });

        document.getElementById('go-to-dash').addEventListener('click', () => {
            const hasVip = cart.some(item => item.id === 'vip');
            window.location.href = `dashboard.html?tier=${hasVip ? 'vip' : 'premium'}`;
        });
    </script>
</body>
</html>
