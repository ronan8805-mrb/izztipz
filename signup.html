<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Elite — DizTipz Signup</title>
    <link rel="stylesheet" href="style.css?v=2.1">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="dark-theme auth-layout flex-center">
    
    <header class="glass-header">
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="My-assets/Screenshot_2026-05-10_183738-removebg-preview.png" alt="DizTipz Logo" id="main-logo">
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="pricing.html">Pricing</a>
                <a href="vip.html" class="vip-highlight">VIP Access</a>
                <div class="auth-group">
                    <a href="login.html" class="btn-text">Sign In</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="auth-card glass">
        <div class="text-center mb-l">
            <img src="My-assets/Screenshot_2026-05-10_183738-removebg-preview.png" alt="DizTipz" class="auth-logo" style="height: 60px; margin-bottom: 1rem;">
            <h2>Start Winning</h2>
            <p>Create your elite account today</p>
        </div>
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Username or Email Address</label>
                <input type="text" id="reg-email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-pass" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary-gold w-full">CREATE ACCOUNT</button>
        </form>
        <div class="auth-footer text-center mt-l">
            <p>Already a member? <a href="login.html" class="gold-text">Sign In</a></p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            registerUser(name, email, pass);
        });
    </script>
</body>
</html>
