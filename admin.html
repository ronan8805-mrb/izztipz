<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diz Admin — Control Center</title>
    <link rel="stylesheet" href="style.css?v=2.2">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="dark-theme auth-layout flex-center">
    
    <div class="auth-card glass">
        <div class="text-center mb-l">
            <h1 class="gold-gradient-text" style="font-size: 2.5rem;">DIZ ADMIN</h1>
            <p>Access the Tip Generator</p>
        </div>
        <form id="admin-login">
            <div class="form-group">
                <label>Admin User</label>
                <input type="text" id="admin-user" required placeholder="dizadmin">
            </div>
            <div class="form-group">
                <label>Secret Key</label>
                <input type="password" id="admin-pass" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary-gold w-full">UNLOCK PORTAL</button>
        </form>
        <div class="text-center mt-l">
            <a href="index.html" class="btn-text">← Back to Site</a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('admin-login').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            if(u === 'dizadmin' && p === 'dizadmin') {
                localStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin-dash.html';
            } else {
                alert('Invalid Admin Credentials');
            }
        });
    </script>
</body>
</html>
